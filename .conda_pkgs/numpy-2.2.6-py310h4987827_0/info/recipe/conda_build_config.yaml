CI: azure
CONDA_BUILD_SKIP_TESTS: ''
c_compiler: vs2019
c_stdlib: vs
channel_sources: conda-forge
channel_targets: conda-forge main
cpu_optimization_target: nocona
cran_mirror: https://cran.r-project.org
cxx_compiler: vs2019
extend_keys:
- ignore_build_only_deps
- pin_run_as_build
- extend_keys
- ignore_version
fortran_compiler: gfortran
ignore_build_only_deps:
- numpy
- python
is_freethreading: 'false'
libblas: 3.9.* *netlib
libcblas: 3.9.* *netlib
liblapack: 3.9.* *netlib
lua: '5'
numpy: '1.22'
perl: 5.26.2
pin_run_as_build:
  python:
    max_pin: x.x
    min_pin: x.x
  r-base:
    max_pin: x.x
    min_pin: x.x
python: 3.10.* *_cpython
r_base: '3.4'
target_platform: win-64
vc: '14'
zip_keys:
- - python
  - numpy
  - channel_sources
  - is_freethreading
